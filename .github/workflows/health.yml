name: Health check (żywy serwer)

# Sprawdza działającą grę na serwerze bez ingerencji w dane:
# strona logowania, API rynku (kursy + indeks giełdowy).
# Uruchamiane aktualizacją pliku .healthcheck (zdalnie) lub ręcznie z Actions.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['.healthcheck']

jobs:
  health:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ secrets.APP_URL || 'https://gra.mppp.com.pl/public' }}
    steps:
      - name: Poczekaj aż deploy tego commita się zakończy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 30); do
            ST=$(gh api "repos/${{ github.repository }}/actions/workflows/deploy.yml/runs?head_sha=${{ github.sha }}&per_page=1" --jq '.workflow_runs[0].status' 2>/dev/null || echo brak)
            echo "deploy: $ST"
            [ "$ST" = "completed" ] && break
            [ "$ST" = "brak" ] && [ $i -gt 3 ] && break
            sleep 10
          done

      - name: Strona logowania odpowiada
        run: |
          CODE=$(curl -sS -o /dev/null -w '%{http_code}' -m 60 "$APP_URL/login.php")
          echo "login.php: HTTP $CODE"
          [ "$CODE" = "200" ] || { echo "::error::login.php nie zwraca 200."; exit 1; }

      - name: API rynku — kursy i indeks giełdowy
        run: |
          RESP=$(curl -sS -m 60 "$APP_URL/api_market.php")
          echo "$RESP" | head -c 500; echo
          echo "$RESP" | python3 -c '
          import json, sys
          j = json.load(sys.stdin)
          assert j.get("ok") is True, "api_market: ok != true"
          assert len(j.get("data", {})) >= 10, "api_market: za malo spolek"
          idx = j.get("index") or {}
          v = float(idx.get("value", 0))
          assert v > 0, "api_market: brak wartosci indeksu"
          print("OK sesja %s: spolek=%d, indeks=%s pkt (%s%%)" % (j.get("session"), len(j["data"]), v, idx.get("chg")))
          '
