name: Deploy (FTP)

# Wypycha kod na serwer przez FTPS przy każdym push do main.
# Sekrety: Settings → Secrets and variables → Actions:
#   FTP_SERVER      host FTP, np. ftp.twojadomena.pl
#   FTP_USERNAME    użytkownik FTP
#   FTP_PASSWORD    hasło FTP
#   FTP_SERVER_DIR  dedykowany folder aplikacji zakończony /, np. ./gpw/
#   DB_HOST         host bazy (zwykle localhost)
#   DB_NAME         nazwa bazy MySQL
#   DB_USER         użytkownik bazy
#   DB_PASS         hasło do bazy
#
# Płatności PayU (OPCJONALNE — bez nich sklep pokazuje "wkrótce"):
#   PAYU_POS_ID, PAYU_MD5 (drugi klucz), PAYU_CLIENT_ID, PAYU_CLIENT_SECRET
#   PAYU_SANDBOX    "1" = środowisko testowe secure.snd.payu.com
#
# Dane bazy (DB_*) NIE trafiają do repo — workflow buduje z nich plik
# config.local.php i wgrywa go na serwer. Ty nie edytujesz nic ręcznie.
# FTP_SERVER_DIR wskaż na OSOBNY folder tylko tej gry (akcja synchronizuje katalog).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-ftp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sprawdź sekrety
        id: chk
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then
            echo "::notice::Brak sekretów FTP — dodaj FTP_* w Settings→Secrets, wtedy deploy ruszy."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi
          if [ -z "${{ secrets.DB_HOST }}" ]; then
            echo "::warning::Brak sekretów bazy (DB_*) — config.local.php nie zostanie zbudowany. Dodaj DB_HOST/DB_NAME/DB_USER/DB_PASS."
            echo "has_db=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_db=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Zbuduj config.local.php z sekretów bazy
        if: steps.chk.outputs.has_db == 'true'
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          PAYU_POS_ID: ${{ secrets.PAYU_POS_ID }}
          PAYU_MD5: ${{ secrets.PAYU_MD5 }}
          PAYU_CLIENT_ID: ${{ secrets.PAYU_CLIENT_ID }}
          PAYU_CLIENT_SECRET: ${{ secrets.PAYU_CLIENT_SECRET }}
          PAYU_SANDBOX: ${{ secrets.PAYU_SANDBOX }}
        run: |
          php -r '$c=["db_driver"=>"mysql","mysql"=>["host"=>getenv("DB_HOST"),"name"=>getenv("DB_NAME"),"user"=>getenv("DB_USER"),"pass"=>getenv("DB_PASS")],"payu"=>["pos_id"=>(string)getenv("PAYU_POS_ID"),"md5"=>(string)getenv("PAYU_MD5"),"client_id"=>(string)getenv("PAYU_CLIENT_ID"),"client_secret"=>(string)getenv("PAYU_CLIENT_SECRET"),"sandbox"=>getenv("PAYU_SANDBOX")==="1"]]; file_put_contents("config.local.php","<?php return ".var_export($c,true).";\n");'
          echo "config.local.php zbudowany (wartości zamaskowane)."

      - name: Deploy przez FTPS
        if: steps.chk.outputs.ok == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # nie wysyłaj śmieci; config.local.php JEST wysyłany (zbudowany wyżej):
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            config.local.php.example
            data/*.sqlite
            cron/*.lock
            **/*.md
            verify.php
